  <ellipse cx="100" cy="55" rx="2.5" ry="4" fill="#d4b8e0" opacity="0.14" transform="rotate(0 100 55)"/>
  <ellipse cx="100" cy="55" rx="2.5" ry="4" fill="#d4b8e0" opacity="0.14" transform="rotate(72 100 55)"/>
  <ellipse cx="100" cy="55" rx="2.5" ry="4" fill="#d4b8e0" opacity="0.14" transform="rotate(144 100 55)"/>
  <ellipse cx="100" cy="55" rx="2.5" ry="4" fill="#d4b8e0" opacity="0.14" transform="rotate(216 100 55)"/>
  <circle cx="100" cy="55" r="2" fill="#c8961e" opacity="0.18"/>

  <!-- Firefly 2 -->
  <circle cx="65" cy="145" r="1.5" fill="#f8e050" opacity="0.20"/>
  <circle cx="65" cy="145" r="3.5" fill="#f8e050" opacity="0.08"/>

  <!-- Leaf pair bottom-left -->
  <path d="M15" cy="160" />
  <path d="M15 165 Q8 155 8 146 Q12 154 15 160Z" fill="#2d5c3c" opacity="0.12"/>
  <path d="M18 165 Q26 155 26 146 Q22 154 18 160Z" fill="#3a7050" opacity="0.11"/>

  <!-- Vine bottom center -->
  <path d="M80 175 Q100 168 120 175 Q140 182 160 175" stroke="#2d5c3c" stroke-width="0.7" fill="none" opacity="0.10"/>

  <!-- Tiny blush bud right-center -->
  <circle cx="180" cy="100" r="4" fill="#f0c8cc" opacity="0.13"/>
  <circle cx="180" cy="100" r="2.2" fill="#e0a8b0" opacity="0.16"/>
  <path d="M180 104 Q179 110 180 115" stroke="#2d5c3c" stroke-width="0.9" fill="none" opacity="0.12"/>

  <!-- Firefly 3 -->
  <circle cx="185" cy="170" r="1.8" fill="#f0d060" opacity="0.20"/>
  <circle cx="185" cy="170" r="4" fill="#f0d060" opacity="0.08"/>

  <!-- Small cross/star ornament -->
  <path d="M50 125 L54 125 M52 123 L52 127" stroke="#c8961e" stroke-width="0.8" fill="none" opacity="0.16"/>
  <path d="M150 50 L154 50 M152 48 L152 52" stroke="#c8961e" stroke-width="0.8" fill="none" opacity="0.14"/>

  <!-- Tiny leaf top-center -->
  <path d="M100 10 Q94 4 92 0 Q96 4 100 8Z" fill="#2d5c3c" opacity="0.12"/>
  <path d="M102 10 Q108 4 108 0 Q104 4 102 8Z" fill="#3a7050" opacity="0.11"/>

  <!-- Firefly 4 -->
  <circle cx="18" cy="192" r="1.2" fill="#f8e860" opacity="0.18"/>
  <circle cx="18" cy="192" r="3" fill="#f8e860" opacity="0.07"/>
