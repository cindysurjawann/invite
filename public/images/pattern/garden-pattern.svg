<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Tiny botanical elements scattered on transparent bg -->

  <!-- Mini rose top-left -->
  <circle cx="28" cy="38" r="5" fill="#e8b8c0" opacity="0.14"/>
  <circle cx="28" cy="38" r="3" fill="#d498a4" opacity="0.18"/>
  <path d="M28 43 Q27 50 28 55" stroke="#2d5c3c" stroke-width="1" fill="none" opacity="0.13"/>
  <path d="M27 48 Q22 46 20 42 Q24 45 27 46Z" fill="#2d5c3c" opacity="0.12"/>

  <!-- Tiny leaf cluster top-right -->
  <path d="M168 22 Q160 14 158 8 Q164 14 168 18Z" fill="#2d5c3c" opacity="0.13"/>
  <path d="M172 22 Q180 14 180 8 Q176 14 172 18Z" fill="#3a7050" opacity="0.11"/>

  <!-- Firefly 1 -->
  <circle cx="140" cy="28" r="1.5" fill="#f0d060" opacity="0.22"/>
  <circle cx="140" cy="28" r="3.5" fill="#f0d060" opacity="0.09"/>

